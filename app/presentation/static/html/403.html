<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 | Access Denied</title>
    <link rel="stylesheet" href="/static/css/error.css">
</head>
<body>
    <main class="error-card">
        <p class="code">403</p>
        <h1 class="title">Access denied</h1>
        <p class="description">You do not have permission to open this resource.</p>
        <img class="illustration" src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/shield-lock.svg" alt="Shield lock icon">
        <div class="actions">
            <a class="btn btn-primary" href="/login">Login</a>
            <a class="btn btn-outline" href="/">Go Home</a>
        </div>
    </main>
</body>
</html>

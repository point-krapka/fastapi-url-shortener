<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error</title>
    <link rel="stylesheet" href="/static/css/error.css">
</head>
<body>
    <main class="error-card">
        <p class="code">5xx</p>
        <h1 class="title">Server error</h1>
        <p class="description">Something went wrong on our side. Please try again soon.</p>
        <img class="illustration" src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/exclamation-octagon.svg" alt="Warning icon">
        <div class="actions">
            <a class="btn btn-primary" href="/">Go Home</a>
            <a class="btn btn-outline" href="/register">Register</a>
        </div>
    </main>
</body>
</html>

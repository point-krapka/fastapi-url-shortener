<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Modern App</title>
    <link rel="stylesheet" href="/static/css/register.css">
</head>
<body>
    <div class="wrapper">
        <div class="glass-card">
            <div class="brand">
                <div class="logo">
<img src="/static/img/scissors.svg" width="40" height="40" alt="" class="flip">
                </div>
                <h1>Create Account</h1>
                <p class="welcome-text">Join us today! Please enter your details.</p>
            </div>

            <form id="register-form" class="register-form" novalidate>
                <div class="input-group">
                    <label for="login">Username</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" id="login" name="login" 
                               placeholder="johndoe" 
                               autocomplete="username"
                               required>
                    </div>
                    <div class="input-hint">Only letters, numbers, and underscore (5-16 chars)</div>
                    <div class="error-message" id="login-error"></div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="password" name="password" 
                               placeholder="••••••••" 
                               autocomplete="new-password"
                               required>
                    </div>
                    <div class="input-hint">Only letters, numbers, and underscore (5-16 chars)</div>
                    <div class="error-message" id="password-error"></div>
                </div>

                <button type="submit" id="register-button" class="submit-btn">
                    <span class="button-text">Sign Up</span>
                    <span class="loader" id="loader" style="display: none;"></span>
                </button>

                <div id="form-feedback" class="feedback-message" style="display: none;"></div>
            </form>

            <p class="auth-redirect">
                Already have an account? <a href="/login">Log in</a>
            </p>
        </div>
    </div>

    <script src="/static/js/register.js"></script>
</body>
</html>
